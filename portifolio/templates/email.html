<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mande-me um e-mail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1992f5;
            --surface: #0e0eff;
            --surface-email:#ff0000;
            --surface-email-hover:#9f0000;
            --surface-esp: #7ec5ff;
            --surface-hover: #0000a8;
            --text: #ffffff;
            --text-muted: #62f4ef;
            --text-muted-esp:#fee500;
            --accent: #98dfff;
            --accent-esp:#ff8f8f;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --border: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* Header / Hero */
        .hero {
            margin-bottom: 64px;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .hero .subtitle {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 24px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            margin-top: 20px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 48px 0;
        }

        /* Section */
        .section {
            margin-bottom: 48px;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .section p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
        }

        /* Form Styles */
        .form-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
        }

        .form-group input,
        .form-group textarea {
            background-color: var(--accent-dim);
            border: 1px solid rgba(34, 211, 238, 0.15);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: rgba(34, 211, 238, 0.18);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--surface-email);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
            font-family: inherit;
        }

        .submit-btn:hover {
            background-color: var(--surface-email-hover);
            transform: translateY(-2px);
        }

        .submit-btn .arrow {
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .submit-btn:hover .arrow {
            transform: translateX(4px);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            margin-bottom: 24px;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .back-link .arrow {
            transition: transform 0.2s ease;
        }

        .back-link:hover .arrow {
            transform: translateX(-4px);
        }

        /* Footer */
        .footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 48px 20px;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .form-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Back Link -->
        <a href="/" class="back-link">
            <span class="arrow">&larr;</span>
            Voltar
        </a>

        <!-- Hero -->
        <header class="hero">
            <h1>Mande-me um e-mail</h1>
            <p class="subtitle">Vamos conversar!</p>
        </header>

        <div class="divider"></div>

        <!-- Form Section -->
        <section class="section">
            <p class="section-label">Formulário de contato</p>
            <div class="form-card">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="name">{{result}}</label>
                    </div>
                    <div class="form-group">
                        <label for="name">Nome</label>
                        <input type="text" name="name" id="name" placeholder="Seu nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="text" name="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="assunto">Assunto</label>
                        <input type="text" name="assunto" id="assunto" placeholder="Assunto do e-mail" required>
                    </div>
                    <div class="form-group">
                        <label for="text">Mensagem</label>
                        <textarea name="text" id="text" rows="10" placeholder="Escreva sua mensagem aqui..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">
                        Enviar
                        <span class="arrow">&rarr;</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Henrique Siqueira</p>
        </footer>

    </div>
</body>
</html>
