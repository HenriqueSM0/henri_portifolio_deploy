<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Henrique Siqueira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1992f5;
            --surface: #0e0eff;
            --surface-esp: #7ec5ff;
            --surface-hover: #0000a8;
            --text: #ffffff;
            --text-muted: #62f4ef;
            --accent: #98dfff;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --border: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--surface);
            transition: color 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
            border-color: var(--accent);
            background-color: var(--surface-hover);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* Projects List */
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            list-style: none;
        }

        .project-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            transition: border-color 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
        }

        .project-card:hover {
            border-color: rgba(34, 211, 238, 0.3);
            background-color: var(--surface-hover);
            transform: translateY(-2px);
        }

        .project-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: var(--text);
        }

        .project-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #f8f8f8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            background-color: var(--accent-dim);
            border: 1px solid rgba(34, 211, 238, 0.15);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .github-link:hover {
            background-color: rgba(34, 211, 238, 0.2);
            transform: translateY(-1px);
        }

        .github-link svg {
            width: 16px;
            height: 16px;
        }

        .youtube-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fe6e6ecd;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            background-color: var(--accent-dim);
            border: 1px solid rgba(34, 211, 238, 0.15);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .youtube-link:hover {
            background-color: rgba(34, 211, 238, 0.2);
            transform: translateY(-1px);
        }

        .youtube-link svg {
            width: 16px;
            height: 16px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 48px 20px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .page-header h1 {
                font-size: 1.6rem;
            }

            .project-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <header class="page-header">
            <h1>Meus projetos</h1>
            <a href="/" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
                Voltar
            </a>
        </header>

        <!-- Projects -->
        <ul class="projects-list">
            {% for proj in projetos %}
                <li class="project-card">
                    <h2>{{proj.1}}</h2>
                    <p>{{proj.2}}</p>
                    <a href="{{proj.3}}" class="github-link" target="_blank" rel="noopener noreferrer">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
                        </svg>
                        Repositorio GitHub
                        {% if proj.4 != 'null' %}
                            <a href="{{proj.4}}" class="youtube-link" target="_blank" rel="noopener noreferrer">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 358">
                                    <path d="M501,56c-6-22-23-39-45-45C416,0,256,0,256,0S96,0,56,11C34,17,17,34,11,56 C0,96,0,179,0,179s0,83,11,123c6,22,23,39,45,45c40,11,200,11,200,11s160,0,200-11c22-6,39-23,45-45c11-40,11-123,11-123 S512,96,501,56z M205,255L205,255V102l133,77L205,255z" fill="#FF0000"/>
                                    <polygon points="205 102 205 255 338 179 205 102" fill="#FFFFFF"/>
                                </svg>
                        {% endif %}
                        Demonstração Youtube
                    </a>
                </li>
            {% endfor %}
        </ul>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Henrique Siqueira</p>
        </footer>

    </div>
</body>
</html>
